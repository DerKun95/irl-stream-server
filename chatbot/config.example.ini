# ===========================================================================
#  Konfiguration fuer den Chat-Bot
#  ANLEITUNG:
#    1) Diese Datei kopieren und in  config.ini  umbenennen.
#    2) Werte unten eintragen (siehe 07-CHAT-STEUERUNG.md).
#    3) config.ini NIEMALS weitergeben - sie enthaelt das Bot-Passwort (Token)!
# ===========================================================================

[twitch]
# Login-Name des EIGENEN Bot-Accounts (klein geschrieben)
bot_username = meinname_bot
# OAuth-Chat-Token des Bot-Accounts (Form: oauth:xxxxxxxxxxxxxxxx)
oauth_token = oauth:HIER_DEN_TOKEN_EINTRAGEN
# Twitch-Kanal der Streamerin (klein geschrieben, ohne #)
channel = ihr_kanalname

[obs]
# obs-websocket laeuft auf demselben Laptop wie der Bot
host = localhost
port = 4455
# Passwort aus OBS: Werkzeuge -> WebSocket-Servereinstellungen
password = HIER_DAS_OBS_WEBSOCKET_PASSWORT

[scenes]
# Exakte Szenennamen wie in OBS (Gross-/Kleinschreibung beachten!)
start = Start Soon
live  = Live
# Optionale Offline-Szene bei !stop (leer lassen = keine)
stop  = Ende
# Eigene Pausen-Szene fuer !brb (leer lassen = Start-Szene)
brb   = BRB
; automatische Szenenwechsel (go-irl) im Chat ankuendigen:
ansagen = true

[commands]
# Befehle lassen sich hier umbenennen, falls gewuenscht
start = !start
live  = !live
stop  = !stop
brb   = !brb
tts   = !tts

[telegram]
# Fuer !tts: Bot-Token (derselbe wie beim Waechter ist ok) und
# die persoenliche Telegram-Chat-ID der Streamerin (siehe Anleitung).
token =
streamer_chat_id =

[permissions]
# Zusaetzlich erlaubte Nutzer (Komma-getrennt, klein) - Mods/Broadcaster
# duerfen ohnehin immer. Beispiel: dein_name, zweiter_mod
extra_allowed =
# Schutz gegen Spam: Mindestabstand zwischen Befehlen in Sekunden
cooldown_seconds = 3

