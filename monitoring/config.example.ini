# ===========================================================================
#  Konfiguration Server-Waechter (Telegram + lokale KI + Auto-Heal + Backup)
#  1) Kopieren und in config.ini umbenennen
#  2) Werte eintragen (siehe 10-HANDY-MONITORING.md)
#  3) NICHT weitergeben (enthaelt Token/Passwoerter)
# ===========================================================================

[telegram]
# Token von @BotFather (Form: 123456789:AAE...xyz)
token = HIER_BOTFATHER_TOKEN
# Deine persoenliche Chat-ID. Leer lassen beim ersten Start: dem Bot in
# Telegram /start schreiben -> er nennt dir die ID -> hier eintragen.
chat_id =

[obs]
host = localhost
port = 4455
# gleiches Passwort wie beim Chat-Bot (OBS -> Werkzeuge -> WebSocket-Server)
password = HIER_DAS_OBS_WEBSOCKET_PASSWORT
# exakter Name der SRT-Quelle in OBS (fuer den Handy-Signal-Check)
srt_source = Handy SRT
# Szenennamen (muessen exakt zu OBS passen - fuer /golive und /standby)
scene_start = Start Soon
scene_live = Live

[ollama]
enabled = true
url = http://localhost:11434
model = qwen3:4b
# false = KI rechnet auf der CPU -> GPU bleibt frei fuer OBS (empfohlen).
# true  = KI nutzt die GPU (schneller, aber riskant waehrend des Streamens).
use_gpu = false

[autoheal]
# Stuerzt OBS oder der Chat-Bot ab, startet der Waechter sie selbst neu
# (fruehestens 3 Min nach Waechter-Start, max. alle 10 Min ein Versuch).
enabled = true
obs_pfad = C:\Program Files\obs-studio\bin\64bit\obs64.exe
# Voller Pfad zur start_bot.bat des Chat-Bots (leer = kein Auto-Neustart):
chatbot_bat =
; Pfad zur start_goirl.bat -> Waechter startet/ueberwacht go-irl mit (leer = aus)
goirl_bat =

[backup]
# Sichert regelmaessig Configs + OBS-Szenen auf die grosse Platte.
enabled = true
ziel = D:\Backups
intervall_tage = 7
# Ordner des Chat-Bots, damit er mitgesichert wird (leer = ueberspringen):
chatbot_ordner =

[thresholds]
# Alarmgrenzen in Prozent
cpu = 92
ram = 92
disk = 90
# Hitze-Alarm ab dieser Temperatur in Grad C (CPU oder GPU)
temp = 90
# Alarm, wenn mehr als X % der Frames seit der letzten Pruefung verworfen wurden
skipped_percent = 5.0
# Pruefintervall in Sekunden
check_interval = 60
# Mindestabstand zwischen gleichen Alarmen in Sekunden (gegen Spam)
alert_cooldown = 900

[dashboard]
; Handy-Dashboard: Webseite mit Live-Werten, Grafiken und Knoepfen.
; Erreichbar im Heimnetz und via Tailscale: http://<Tailscale-IP>:8181/
; (Die FritzBox gibt diesen Port NICHT frei - aus dem Internet unerreichbar.)
enabled = true
port = 8181
; Optionaler Zugangs-Schluessel. Wenn gesetzt, lautet die Adresse
; http://<IP>:8181/?key=DEINSCHLUESSEL
key =

[app]
; Streamer-App fuer die Streamerin + Mods (Login + Rollen), erreichbar via Cloudflare-Tunnel.
enabled = true
port = 8182
secret =                 ; leer = wird automatisch erzeugt
; Nutzer: name:passwort:rolle  (rolle = admin | voll | mod), komma-getrennt
; 'admin' darf alles + Rechte-Verwaltung/Ruhemodus, 'voll' darf alles (inkl.
; Stream beenden), 'mod' darf Start/Live/BRB + sehen.
;
; EMPFOHLEN: Passwoerter NICHT im Klartext, sondern als Hash speichern.
;   ->  python passwort_hash.py   ausfuehren; das erzeugt eine fertige Zeile mit
;       einem pbkdf2$...-Hash, die du hier eintraegst.
;   Klartext-Passwoerter funktionieren uebergangsweise noch, sollten aber
;   nach und nach durch Hashes ersetzt werden.
; Beispiel mit Hashes (gekuerzt):
users = streamerin:pbkdf2$200000$SALT$HASH:voll, mod1:pbkdf2$200000$SALT$HASH:mod

[twitch]
; Fuer Titel/Kategorie (und spaeter Raid). Werte aus dev.twitch.tv/console/apps.
# Twitch-Kanalname (Login, klein) - fuer den Chat im Dashboard
kanal =
client_id =
client_secret =
; Muss in der Twitch-App als OAuth Redirect URL EXAKT so eingetragen sein:
redirect = https://steuerung.deine-domain.com/oauth/callback

[heartbeat]
; Externer Totmann-Schalter: kostenloses Konto auf healthchecks.io,
; einen Check anlegen, dessen Ping-URL hier eintragen. Bleibt der Ping aus
; (Laptop eingefroren/aus), bekommst du eine E-Mail. Leer = aus.
url =

[switcher]
; Schlauer Auto-Switch: schaltet bei Matsch-Bild (zu niedriger Eingangs-Bitrate)
; selbst auf BRB - nicht erst beim Totalausfall. Liest die go-irl-Statistik.
; Voraussetzung: einmalig "pip install websocket-client" auf dem Laptop.
; WICHTIG: damit sich Waechter und go-irl nicht streiten, beim go-irl-Stats-
; Browser die "Erweiterter Zugriff auf OBS" wieder ENTFERNEN (dann schaltet
; nur noch der Waechter; die Stats-Anzeige bleibt).
enabled = false
ws_url = ws://127.0.0.1:8888/ws
min_kbit = 500          ; unter diesem Wert gilt das Bild als kaputt -> BRB
brb_sekunden = 4        ; so lange muss es schlecht sein, bevor auf BRB geschaltet wird
live_sekunden = 8       ; so lange muss es wieder gut sein, bevor zurueck auf Live

[moblin]
; Empfaengt Handy-Status (Akku, Waerme-Flamme, Bitrate) aus Moblins Fernsteuerung.
; Der Waechter ist der "Assistent". In Moblin: Fernbedienung -> Streamer ->
;   Aktiviert AN, Assistent-URL = ws://<PC-IP>:2345 (unterwegs Tailscale-IP),
;   Passwort = exakt dasselbe wie hier unten.
; Braucht einmalig:  pip install websockets cryptography
enabled = true
port = 2345
passwort = DEIN-MOBLIN-FERNSTEUER-PASSWORT
; Wenn keine Werte ankommen, hier auf true stellen (AES-verschluesselte Verbindung):
verschluesselt = false
status_intervall = 2    ; Sekunden zwischen Status-Updates vom Handy
