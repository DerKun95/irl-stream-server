<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wonderland-Reminder</title>
<script>
// ============================================================
//  HIER ANPASSEN:
//  Alle WIE_OFT_MINUTEN ploppt einer der Sprueche unten rein,
//  bleibt WIE_LANGE_SEKUNDEN stehen und verschwindet wieder.
const WIE_OFT_MINUTEN    = 12;   // Abstand zwischen zwei Einblendungen
const WIE_LANGE_SEKUNDEN = 9;    // wie lange jeder Spruch sichtbar ist
const ECKE = "unten-links";      // "unten-links", "unten-rechts", "oben-links", "oben-rechts"

// Freche, aber hilfreiche Sprueche (beliebig erweitern/aendern):
const SPRUECHE = [
  "💧 Trink mal 'n Schluck, Süße!",
  "🔋 Akku-Check – noch genug Saft?",
  "🐾 Kurz lächeln – du bist LIVE!",
  "📍 Sag dem Chat, wo wir gerade sind!",
  "🧭 Schau, wo du hinläufst – safety first.",
  "📸 Winken! Die Leute lieben dich.",
  "🌬️ Tief durchatmen – läuft alles super.",
  "🍫 Pause-Snack verdient? Auf jeden Fall.",
  "🦶 Noch fit? Sonst kurz !brb und durchschnaufen.",
  "✨ Reminder: du machst das gerade richtig gut.",
];
// ============================================================
</script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1920px;height:1080px;overflow:hidden;background:transparent;
            font-family:"Ink Free","Segoe Print","Comic Sans MS",cursive;}
  #box{position:absolute;display:flex;align-items:center;gap:18px;
       padding:22px 34px 22px 26px;border-radius:30px;
       background:linear-gradient(120deg,rgba(246,207,217,.93),rgba(233,196,239,.93),rgba(217,189,244,.93));
       border:3px solid rgba(255,255,255,.95);
       box-shadow:0 10px 30px rgba(150,90,140,.45),0 0 30px rgba(255,150,210,.5);
       transform:translateY(160%);opacity:0;transition:transform .7s cubic-bezier(.2,1.3,.4,1),opacity .5s;}
  #box.an{transform:translateY(0);opacity:1;}
  /* Position */
  .unten-links {left:60px;bottom:70px;}
  .unten-rechts{right:60px;bottom:70px;}
  .oben-links  {left:60px;top:70px;}
  .oben-rechts {right:60px;top:70px;}

  #hund{font-size:64px;animation:wedeln 1.1s ease-in-out infinite;filter:drop-shadow(0 4px 6px rgba(150,90,140,.4));}
  @keyframes wedeln{0%,100%{transform:rotate(-6deg) translateY(0);}50%{transform:rotate(6deg) translateY(-6px);}}
  #text{font-size:40px;color:#7a3f74;text-shadow:1px 2px 0 rgba(255,255,255,.7);max-width:760px;line-height:1.15;}
  #stern{position:absolute;top:-14px;right:24px;font-size:40px;color:#fff;
         text-shadow:0 0 14px rgba(255,150,210,.9);animation:funkeln 2.2s ease-in-out infinite;}
  @keyframes funkeln{0%,100%{opacity:.5;transform:scale(1) rotate(0);}50%{opacity:1;transform:scale(1.2) rotate(15deg);}}
  .pfote{position:absolute;font-size:26px;opacity:.85;animation:verblassen 3s ease-out forwards;}
  @keyframes verblassen{to{opacity:0;transform:translateY(8px);}}
</style>
</head>
<body>
  <div id="box">
    <div id="stern">✦</div>
    <div id="hund">🐕</div>
    <div id="text"></div>
  </div>
<script>
  const box=document.getElementById("box");
  const txt=document.getElementById("text");
  box.classList.add(ECKE);
  let letzte=-1;

  function zeige(){
    let i;
    do{ i=Math.floor(Math.random()*SPRUECHE.length); }
    while(SPRUECHE.length>1 && i===letzte);
    letzte=i;
    txt.textContent=SPRUECHE[i];
    box.classList.add("an");
    // ein paar Pfoten als Deko
    for(let k=0;k<3;k++){
      setTimeout(()=>{
        const p=document.createElement("div");
        p.className="pfote";p.textContent="🐾";
        const r=box.getBoundingClientRect();
        p.style.left=(r.left+r.width-30+k*4)+"px";
        p.style.top=(r.top+r.height-6)+"px";
        document.body.appendChild(p);
        setTimeout(()=>p.remove(),3100);
      },k*180);
    }
    setTimeout(()=>box.classList.remove("an"), WIE_LANGE_SEKUNDEN*1000);
  }

  // erste Einblendung nach 30 s, dann im Takt
  setTimeout(()=>{ zeige(); setInterval(zeige, WIE_OFT_MINUTEN*60*1000); }, 30000);
</script>
</body>
</html>
